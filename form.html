<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Oquest - Formulário</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
</head>
<body class="bg-slate-50 min-h-screen p-4 sm:p-6 font-sans">

    <div class="max-w-md mx-auto">
        
        <a href="index.html" class="inline-flex items-center text-slate-500 text-sm font-medium mb-6 hover:text-blue-600 transition-colors">
            <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i>
            Voltar ao Dashboard
        </a>

        <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 p-6 sm:p-8 border border-slate-100">
            
            <header class="mb-8 text-center sm:text-left">
                <h2 class="text-2xl font-bold text-slate-800">Nova Ocorrência</h2>
                <p class="text-sm text-slate-500 mt-1">Dados automáticos do QR carregados.</p>
            </header>

            <form id="oquest-form" class="space-y-6">
                
                <div class="grid grid-cols-1 gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">ID Máquina (P1)</label>
                        <input type="text" id="p1" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="ID da máquina">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">Série (P2)</label>
                            <input type="text" id="p2" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Série">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">Modelo (P3)</label>
                            <input type="text" id="p3" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Modelo">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <label for="ocorrencia_text" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1 ml-1">Descrição do Problema</label>
                    <textarea id="ocorrencia_text" rows="4" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="Descreva a avaria."></textarea>
                </div>

                <div class="space-y-4">
                    <button type="button" id="btn-audio" class="w-full flex items-center justify-center gap-3 bg-slate-800 text-white py-4 rounded-xl font-semibold active:bg-red-600 transition-colors">
                        <i data-lucide="mic" class="w-5 h-5"></i>
                        <span id="audio-text">Gravar Áudio</span>
                    </button>
                    <audio id="audio-preview" controls class="hidden w-full mt-2"></audio>

                    <button type="button" id="btn-video" class="w-full flex items-center justify-center gap-3 bg-slate-100 text-slate-800 py-4 rounded-xl font-semibold border-2 border-slate-200 active:bg-slate-200 transition-colors">
                        <i data-lucide="video" class="w-5 h-5"></i>
                        <span id="video-text">Gravar Vídeo</span>
                    </button>
                    <video id="camera-live" autoplay muted playsinline class="hidden w-full rounded-xl bg-black mt-2"></video>
                    <video id="video-preview" controls class="hidden w-full rounded-xl mt-2 shadow-md"></video>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 flex items-center justify-center gap-2 mt-8 active:scale-[0.98]">
                    Enviar Relatório
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="supabase.js"></script>
    <script src="app.js"></script>
</body>
</html>
