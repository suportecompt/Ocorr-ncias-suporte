<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo Live - Suporte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://meet.jit.si/external_api.js"></script>

    <meta name="robots" content="noindex, nofollow">
</head>
<body class="bg-slate-900 h-screen w-screen overflow-hidden flex flex-col font-sans">
    
    <div class="bg-slate-800 p-4 flex items-center shadow-lg z-10">
        <a href="index.html" class="flex items-center text-slate-300 hover:text-white transition-colors">
            <i data-lucide="chevron-left" class="w-6 h-6 mr-1"></i>
            <span class="font-semibold text-sm sm:text-base">Sair da Chamada</span>
        </a>
        <span class="ml-auto text-xs text-rose-500 font-bold tracking-widest uppercase flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span> Live
        </span>
    </div>

    <div id="jitsi-container" class="flex-grow w-full bg-black"></div>

    <script src="config.js"></script>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const domain = JITSI_DOMAIN;
        const options = {
            roomName: JITSI_ROOM_NAME, // Your specific room name
            parentNode: document.querySelector('#jitsi-container'),
            
            // 1. Set a default name to bypass the name prompt
            userInfo: {
                displayName: 'Cliente'
            },
            
            configOverwrite: {
                // 2. Disable the prejoin page (using both old and new methods to be safe)
                prejoinPageEnabled: false, 
                prejoinConfig: {
                    enabled: false
                },
                requireDisplayName: false, // Ensure the system doesn't force a name input
                
                // 3. Prevent the app download prompt on mobile (opens directly in the browser)
                disableDeepLinking: true,
                
                // 4. Start with audio and video enabled by default
                startWithAudioMuted: false,
                startWithVideoMuted: false,

                // 5. Hide toolbar buttons so the client interface remains minimal
                toolbarButtons: [],

                // Ocultar botones de la cabecera (incluyendo perfil/login en versiones nuevas)
                headerButtons: [],
                disableProfile: true,

                // AÑADIDO: Ocultar botón de login / iniciar sesión
                disableLogin: true,
                hideLoginButton: true
            },
            interfaceConfigOverwrite: {
                SHOW_JITSI_WATERMARK: false,
                SHOW_BRAND_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                DEFAULT_BACKGROUND: '#000000',
                HIDE_CONFERENCE_SUBJECT: true,

                // AÑADIDO: Ocultar autenticación en la interfaz gráfica
                AUTHENTICATION_ENABLE: false
            }
        };

        // Initialize the Jitsi call API
        const api = new JitsiMeetExternalAPI(domain, options);
    </script>
</body>
</html>
